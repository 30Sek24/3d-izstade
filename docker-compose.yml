version: '3.8'

services:
  # The React Frontend / Main Application
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    depends_on:
      - backend

  # API/Backend Layer (If extracted from Vite into a standalone Node server)
  # Currently architectural preparation for Node backend
  backend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: npm run start:backend
    ports:
      - "3000:3000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - STRIPE_SECRET=${STRIPE_SECRET}
      - REDIS_URL=redis://redis:6379

  # Background Task Execution Worker (AI Agents)
  worker:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: npm run worker:start
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  # Redis for task queuing and fast caching
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
